services:

  web:
    build: .

    command: >
      gunicorn
      config.wsgi:application
      --bind 0.0.0.0:8000

    volumes:
      - .:/app

    env_file:
      - .env

    expose:
      - 8000

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media

    depends_on:
      - web